name: Bug Report
description: Report a reproducible problem in seishin2d.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it locally.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List exact commands and actions.
      placeholder: |
        1. Run `cargo run -p seishin2d_basic_2d`
        2. Press ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust Version
      placeholder: "rustc --version"
  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      render: text
